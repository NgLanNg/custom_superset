  workflows:
    - name: Analytics Model Development
      steps:
        - Understand the business question and metric definition from stakeholders
        - Identify required data sources and assess data quality and freshness
        - Design the data model including grain, dimensions, and measures
        - Create or update staging models for source data standardization
        - Build intermediate models for complex business logic
        - Create the final fact or dimension mart with appropriate materialization
        - Write comprehensive tests (unique, not_null, relationships, custom)
        - Add documentation for models, columns, and business logic
        - Run dbt build to execute models and tests
        - Review query performance and optimize if needed
        - Open pull request with clear description of changes
        - Deploy to production and communicate changes to stakeholders

    - name: BI Tool Integration
      steps:
        - Understand BI tool requirements and user personas
        - Design semantic layer or dataset optimized for visualization
        - Ensure metrics are consistently defined between dbt and BI tool
        - Create base explores/datasets with appropriate joins and relationships
        - Implement row-level security and access controls
        - Optimize for query performance (caching, aggregation awareness)
        - Document data sources and field definitions for end users
        - Create example dashboards and reports as templates
        - Train business users on self-service capabilities
        - Monitor usage patterns and query performance

    - name: Data Quality Incident Response
      steps:
        - Receive alert from dbt tests or data quality monitoring
        - Assess scope of impact using dbt lineage to identify affected models and dashboards
        - Communicate to stakeholders if critical reports are affected
        - Quarantine or fix the source of bad data
        - Implement additional tests to prevent recurrence
        - Backfill or correct affected data if necessary
        - Document incident root cause and resolution
        - Update runbook with lessons learned

    - name: Schema Evolution
      steps:
        - Assess impact of schema changes on existing models using dbt lineage
        - Design backward-compatible changes where possible
        - Update staging models to handle new or changed columns
        - Modify downstream models incrementally
        - Update tests to reflect new schema
        - Update documentation and communicate changes
        - Run full refresh in staging to validate changes
        - Coordinate with BI tool administrators for downstream updates
        - Deploy to production with monitoring

