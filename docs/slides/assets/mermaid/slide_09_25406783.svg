RM_SEC_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_TRANSFORM_SPROD_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_SEC_GEI_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_SPROD_GEI_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g class="label" data-id="L_GEI_SLIDE_0" transform="translate(0, 0)"><foreignObject width="0" height="0"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g class="node" id="TRANSFORM" transform="translate(328, 470)"><rect class="basic label-container" style="fill:#E65100 !important;stroke:#BF360C !important" x="-119.7109375" y="-92" width="239.421875" height="184"/><g class="label" style="color:#fff !important" transform="translate(-103.7109375, -84)"><rect/><foreignObject width="207.421875" height="168"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#fff !important" class="nodeLabel"><p>⚙️ Lambda: extract_excel_base_scenario<br />detect header → classify columns<br />→ melt wide→long → trim strings → append to postgres</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SH1-0" transform="translate(173, 168)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Sheet: Energy Consumption<br />Fields: BU, OPU, Parameters (category), UOM, Source<br />Year cols: 2019…2050<br />Excludes: rows where source LIKE '%total energy%'</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SH2-1" transform="translate(483, 168)"><rect class="basic label-container" style="" x="-130" y="-135" width="260" height="270"/><g class="label" style="" transform="translate(-100, -120)"><rect/><foreignObject width="200" height="240"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Sheet: Production<br />Fields: BU, OPU, Parameters, UOM<br />Year cols: 2019…2050<br />UOM filter: MTPA, MWh/yr, Thousand manhours, (t-nm)<br />OPU remaps: GPK/GPS/TSET→GPP, UK/UG→UT, GT/RGTP/RGTSU→GTR</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SEC-2" transform="translate(173, 736)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>silver_energy_consumption<br />Rows: OPU, Scope, Source (energy category)<br />UOM, Year, Value, scenario_id, user_email<br />(no Type col — energy is not split OC/ES at source)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SPROD-3" transform="translate(483, 736)"><rect class="basic label-container" style="" x="-130" y="-63" width="260" height="126"/><g class="label" style="" transform="translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>silver_production<br />Rows: BU, OPU, Parameters, UOM, Year, Value, Type</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-GEI-4" transform="translate(328, 1370)"><rect class="basic label-container" style="" x="-133.15625" y="-435" width="266.3125" height="870"/><g class="label" style="" transform="translate(-103.15625, -420)"><rect/><foreignObject width="206.3125" height="840"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>gold_energy_intensity  ← UNION ALL OC + ES<br />CTE 1: energy_consumption (silver_energy_consumption)<br />ROW_NUMBER() OVER (PARTITION BY opu, scope, source, uom, year)<br />WHERE source NOT LIKE '%total energy%'<br />SUM(value) GROUP BY opu, year  ← no type col in silver<br />CTE 2: production_oc — type = 'operational control'<br />CTE 3: production_es — type = 'equity share'<br />OPU remaps: GPK/GPS/TSET→GPP, UK/UG→UT, GT/RGTP/RGTSU→GTR<br />Shipping → MISC<br />Block 1: energy_consumption LEFT JOIN production_oc<br />energy_intensity = SUM(consumption) / SUM(production)<br />MISC/MMHE: production ÷ 1,000,000<br />uom hardcoded = 'GJ/tonne'<br />UNION ALL<br />Block 2: energy_consumption LEFT JOIN production_es<br />same intensity formula, type from ES production</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SLIDE-16" transform="translate(328, 2063)"><rect class="basic label-container" style="fill:#1B5E20 !important;stroke:#388E3C !important" x="-130" y="-183" width="260" height="366"/><g class="label" style="color:#fff !important" transform="translate(-100, -168)"><rect/><foreignObject width="200" height="336"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#fff !important" class="nodeLabel"><p>🖼️ Slide 09 — Energy Consumption &amp; Intensity (OC)<br />Gold table: gold_energy_intensity<br />Left: OPU stacked bar — energy consumption (Mill GJ)<br />Right: Per-OPU energy intensity (GJ/tonne, GJ/MWh, GJ/Mil t-nm, GJ/thousand manhours)<br />Tables: YEP 2025 + 2026-2030 forecast</p></span></div></foreignObject></g></g></g></g></g></svg>