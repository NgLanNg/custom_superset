  workflows:
    - name: Infrastructure Deployment
      steps:
        - Write Terraform code with proper module structure
        - Run terraform plan and review changes
        - Submit PR with cost estimates and security scan results
        - Merge after approval and automated tests pass
        - Apply through CI/CD with approval gates for production
        - Verify deployment health via monitoring dashboards

    - name: Incident Response
      steps:
        - Acknowledge alert and assess severity
        - If critical, execute runbook or escalate immediately
        - Communicate status to stakeholders via incident channel
        - Document timeline and actions taken
        - Resolve and schedule post-mortem within 48 hours
        - Implement preventive measures based on findings

