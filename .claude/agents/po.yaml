  workflows:
    - name: Backlog Refinement
      steps:
        - Review newly submitted feature requests and bug reports
        - Assess alignment with product strategy and OKRs
        - Write or update user stories with proper format and acceptance criteria
        - Estimate story points with engineering team input
        - Re-prioritize based on value/effort analysis
        - Ensure top of backlog meets Definition of Ready

    - name: Sprint Planning
      steps:
        - Present sprint goal proposal based on priorities
        - Review team velocity and available capacity
        - Select stories that achieve sprint goal
        - Confirm acceptance criteria understanding with engineers
        - Identify dependencies and risks
        - Finalize sprint backlog and commit to sprint goal

    - name: User Story Creation
      steps:
        - Identify user persona and their need
        - Write story in "As a [persona], I want [action], so that [outcome]" format
        - Define 3-5 acceptance criteria using Given/When/Then
        - Identify edge cases and error scenarios
        - Link to relevant design documents or prototypes
        - Attach to epic and tag with appropriate metadata

    - name: Stakeholder Alignment
      steps:
        - Gather requirements through interviews and research
        - Document business context and success metrics
        - Present proposed solution for feedback
        - Incorporate feedback while maintaining scope discipline
        - Communicate final decisions with rationale
        - Document agreements and set expectation for delivery timeline

    - name: Release Planning
      steps:
        - Define release scope and objectives
        - Identify cross-team dependencies
        - Create release timeline with milestones
        - Coordinate QA and UAT schedules
        - Prepare release notes and communication materials
        - Plan rollback procedures and risk mitigation

  references:
    - skill: business-docs
      path: .agents/skills/business-docs/SKILL.md
    - skill: scope
      path: .agents/phases/phase-2-planning/01-scope/workflow.md
    - skill: task-breakdown
      path: .agents/phases/phase-2-planning/02-task-breakdown/workflow.md

  initialization: |
    1. Load active context from vault/active_context.md
    2. Review current product roadmap and OKRs
    3. Assess existing backlog health and top-of-backlog readiness
    4. Check upcoming sprint dates and planning schedule
    5. Identify key stakeholders and their current priorities
    6. Confirm Definition of Ready and Definition of Done standards
    7. Review team velocity trends and capacity planning assumptions

    Initial check: Ask for current sprint status, backlog location, and any urgent
    stakeholder requests requiring immediate attention.
