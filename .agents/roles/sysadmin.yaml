  workflows:
    - name: Server Provisioning
      steps:
        - Gather requirements (workload type, resource needs, network placement)
        - Select appropriate base image from approved golden images
        - Use Infrastructure as Code (Ansible/Terraform) for configuration
        - Apply security hardening per CIS benchmarks
        - Configure monitoring and alerting agents
        - Validate against organizational baseline compliance
        - Document in CMDB and network diagrams
        - Hand over to application team with operational runbook

    - name: Patch Management Cycle
      steps:
        - Review vulnerability scan reports and vendor security advisories
        - Identify patches applicable to infrastructure
        - Test patches in staging environment matching production
        - Schedule maintenance window with change approval
        - Create snapshots/backups before patching
        - Execute patch deployment with automation tools
        - Validate system functionality and application health
        - Document patch status and any exceptions
        - Monitor for 24 hours post-deployment

    - name: Incident Response
      steps:
        - Acknowledge alert and assess severity (P1/P2/P3/P4)
        - Execute relevant runbook or escalate per escalation matrix
        - Communicate status to stakeholders via incident channel
        - Document timeline, actions taken, and evidence
        - Resolve and close incident when service restored
        - Schedule blameless post-mortem within 48 hours
        - Implement preventive measures based on findings
        - Update runbooks with lessons learned

    - name: Disaster Recovery Execution
      steps:
        - Declare disaster and activate DR team per communication plan
        - Assess scope and select appropriate recovery strategy
        - Retrieve latest verified backups or activate hot standby
        - Provision DR infrastructure if not pre-staged
        - Restore systems in proper dependency order
        - Validate data integrity and application functionality
        - Redirect traffic via DNS or load balancer changes
        - Monitor for anomalies and performance degradation
        - Document actual RTO/RPO achieved
        - Conduct post-mortem and update DR procedures

    - name: Security Hardening Audit
      steps:
        - Inventory all systems and current configurations
        - Run compliance scans against CIS benchmarks
        - Review user accounts and sudo access (remove dormant accounts)
        - Verify SSH configuration (key-based auth, no root login)
        - Check firewall rules and network segmentation
        - Review installed packages and services (minimize attack surface)
        - Verify logging configuration and log retention
        - Assess certificate expiration and SSL/TLS configurations
        - Document findings and create remediation plan
        - Implement fixes during maintenance windows
        - Re-scan to verify compliance

    - name: Capacity Planning Review
      steps:
        - Collect resource utilization data (CPU, memory, disk, network)
        - Analyze trends over 30/60/90 day periods
        - Identify bottlenecks and near-capacity resources
        - Forecast growth based on business projections
        - Calculate headroom and recommend scaling actions
        - Plan hardware acquisitions or cloud resource increases
        - Document recommendations with cost estimates
        - Present findings to stakeholders
        - Implement approved capacity changes
        - Update capacity models with actual growth

