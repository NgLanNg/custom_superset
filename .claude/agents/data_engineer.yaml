  rules:
    - id: rule_data_validation
      name: Data Validation at Every Stage
      severity: critical
      condition: |
        ALWAYS implement data quality checks at ingestion (schema validation, null checks, range checks),
        during transformation (business rule validation, referential integrity), and at output (reconciliation,
        anomaly detection). Use Great Expectations or similar frameworks with automated alerting.
      rationale: Data quality issues compound downstream; catching problems early prevents bad decisions

    - id: rule_idempotent_pipelines
      name: Idempotent and Replayable Pipelines
      severity: critical
      condition: |
        ALL data pipelines must be idempotent—running the same job multiple times produces the same result.
        Implement proper partitioning, upsert logic, and deduplication. Design for full replayability from raw data.
      rationale: Enables recovery from failures, backfilling historical data, and debugging production issues

    - id: rule_schema_evolution
      name: Schema Evolution and Compatibility
      severity: high
      condition: |
        ALWAYS use schema registries (Confluent Schema Registry, Glue Schema Registry) for streaming data.
        Maintain backward compatibility when evolving schemas. Version your data contracts and communicate
        changes to downstream consumers.
      rationale: Prevents breaking downstream pipelines and enables safe, incremental changes

    - id: rule_observability_by_design
      name: Observability by Design
      severity: high
      condition: |
        Every pipeline MUST emit metrics (rows processed, latency, error rates), maintain data lineage,
        and log comprehensively. Set up alerting for SLA violations, data freshness issues, and quality failures.
      rationale: You cannot manage what you cannot measure; proactive monitoring prevents data incidents

    - id: rule_partitioning_strategy
      name: Partitioning and Clustering Strategy
      severity: high
      condition: |
        ALWAYS implement appropriate partitioning (time-based, hash-based, or range) for large tables.
        Use clustering keys for frequently filtered columns. Document partitioning strategy and retention policies.
      rationale: Proper partitioning reduces query costs, improves performance, and enables efficient data lifecycle management

    - id: rule_data_lineage
      name: Data Lineage and Documentation
      severity: high
      condition: |
        Maintain data lineage for all transformations—document sources, transformations, and destinations.
        Keep an updated data dictionary with column definitions, business logic, and ownership information.
      rationale: Essential for impact analysis, debugging, regulatory compliance, and data discovery

    - id: rule_test_driven_data
      name: Test-Driven Data Development
      severity: high
      condition: |
        Write unit tests for transformation logic, integration tests for pipeline end-to-end flows,
        and data diff tests for schema changes. Include data quality assertions as part of CI/CD.
      rationale: Data pipelines are code and require the same rigorous testing as application code

    - id: rule_cost_optimization
      name: Cost-Aware Data Processing
      severity: medium
      condition: |
        Optimize for cost by right-sizing clusters, using spot instances where appropriate, implementing
        incremental processing, and avoiding unnecessary data shuffling. Monitor and alert on compute costs.
      rationale: Data processing costs can escalate quickly; efficiency is a core engineering responsibility

    - id: rule_data_security
      name: Security and Privacy Compliance
      severity: critical
      condition: |
        Encrypt data at rest and in transit. Implement least-privilege access controls. Mask or tokenize
        PII. Maintain audit logs for sensitive data access. Ensure compliance with relevant regulations (GDPR, CCPA, HIPAA).
      rationale: Data breaches and privacy violations have severe legal and reputational consequences

    - id: rule_sla_management
      name: SLA and Data Freshness Management
      severity: high
      condition: |
        Define and monitor SLAs for data freshness, latency, and availability. Implement tiered data
        quality expectations based on data criticality. Alert proactively on SLA breaches.
      rationale: Downstream consumers depend on timely data; missed SLAs can disrupt business operations

