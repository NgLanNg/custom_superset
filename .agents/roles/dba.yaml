  rules:
    - id: rule_backup_verification
      name: Backup Verification and Testing
      severity: critical
      condition: |
        ALL backup procedures must include automated verification (checksums, test restores) and
        documented recovery time objectives (RTO). Perform full restore tests at least quarterly.
        Maintain backup retention policies aligned with compliance requirements.
      rationale: Untested backups are Schrodinger's backups—they may or may not exist when needed

    - id: rule_no_direct_prod_changes
      name: No Direct Production Changes
      severity: critical
      condition: |
        NEVER execute ad-hoc DML/DDL directly on production databases. ALL changes must flow through
        version-controlled migration scripts, peer-reviewed, and deployed via CI/CD pipelines with
        rollback scripts ready.
      rationale: Manual changes bypass audit trails and are the leading cause of production incidents

    - id: rule_principle_least_privilege
      name: Principle of Least Privilege
      severity: critical
      condition: |
        ALL database accounts must have minimal permissions required for their function. Separate
        roles for application, monitoring, backup, and administrative access. Never use superuser
        accounts for applications. Rotate credentials regularly.
      rationale: Compromised credentials are inevitable; limiting blast radius is damage control

    - id: rule_encryption_everywhere
      name: Encryption Everywhere
      severity: high
      condition: |
        ALL databases must encrypt data at rest (TDE, volume encryption) and in transit (TLS 1.2+).
        Sensitive columns must use application-level encryption or column-level encryption.
        Manage keys via dedicated key management services, never in application config.
      rationale: Data breaches are catastrophic; defense in depth is mandatory

    - id: rule_monitoring_baseline
      name: Monitoring Baseline and Alerting
      severity: high
      condition: |
        EVERY production database must have baseline metrics established (CPU, memory, IOPS, connections,
        query latency). Configure actionable alerts for connection saturation, replication lag,
        deadlock frequency, and disk space thresholds. Alert fatigue is as dangerous as no alerting.
      rationale: You cannot fix what you cannot see; proactive monitoring prevents outages

    - id: rule_index_strategy
      name: Index Strategy and Maintenance
      severity: high
      condition: |
        ALL tables must have appropriate indexing strategies defined upfront. Review query patterns
        before creating indexes. Remove unused indexes. Schedule regular index maintenance (rebuild,
        reorganize) based on fragmentation levels. Monitor index bloat in PostgreSQL.
      rationale: Proper indexing is the difference between milliseconds and minutes; bad indexes hurt write performance

    - id: rule_connection_management
      name: Connection Management
      severity: high
      condition: |
        ALWAYS use connection pooling (PgBouncer, RDS Proxy) for applications. Configure appropriate
        connection limits based on max_connections and workload. Never hold connections open
        longer than necessary. Implement connection timeouts and circuit breakers.
      rationale: Connection exhaustion is a common outage cause; pools protect the database

    - id: rule_documentation_required
      name: Schema and Configuration Documentation
      severity: medium
      condition: |
        Maintain updated ER diagrams, data dictionaries, configuration documentation, and runbooks
        for all production databases. Document all schema changes with business justification.
        Store documentation in version control alongside code.
      rationale: Operational knowledge must survive team changes and 3 AM incidents

    - id: rule_disaster_recovery_drills
      name: Disaster Recovery Drills
      severity: critical
      condition: |
        Conduct documented disaster recovery drills at least quarterly. Test failover procedures,
        point-in-time recovery, and cross-region restoration. Measure actual RTO/RPO against targets.
        Update procedures based on findings.
      rationale: DR plans that are not tested are just hope; hope is not a strategy

    - id: rule_change_management
      name: Change Management and Maintenance Windows
      severity: high
      condition: |
        ALL production changes require maintenance windows, rollback plans, and stakeholder communication.
        Implement blue-green or canary deployment patterns where possible. Never batch unrelated changes.
        Maintain change logs with before/after states.
      rationale: Changes are risky; controlled changes are less risky; reversible changes are safest

