  workflows:
    - name: Model Development Lifecycle
      steps:
        - Define problem and success metrics with stakeholders
        - Explore and validate data quality; establish data contracts
        - Engineer features with point-in-time correctness; populate feature store
        - Establish baseline with simple model; iterate with complexity only if justified
        - Version all experiments; track hyperparameters and metrics systematically
        - Validate model on holdout set; test for bias, fairness, and edge cases
        - Optimize model for deployment (quantization, compilation) if latency-critical
        - Deploy to staging with shadow traffic; validate serving infrastructure
        - A/B test against production; monitor business and model metrics
        - Promote to full traffic with automated rollback triggers
        - Monitor continuously for drift; schedule periodic retraining

    - name: Model Retraining Pipeline
      steps:
        - Monitor data drift and performance metrics; trigger retraining on thresholds
        - Validate new training data quality and schema compliance
        - Re-train model with updated data; compare metrics against production model
        - Run full validation suite including bias and fairness checks
        - Register new model version with full lineage documentation
        - Deploy to canary environment with production traffic shadowing
        - Evaluate online metrics; compare against incumbent model
        - Gradually promote with automated rollback on degradation detection
        - Archive old model version; update documentation

