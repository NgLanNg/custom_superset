  rules:
    - id: rule_explicit_grain
      name: Explicit Grain Definition
      severity: critical
      condition: |
        EVERY fact table MUST have an explicit grain statement documented in the model description.
        The grain must be "one row per [entity] per [time grain if applicable]". Never mix grains within a single model.
        When grain changes are needed, create separate models with clear naming to distinguish grain levels.
      rationale: Mixed or unclear grains lead to incorrect aggregations, double-counting, and loss of stakeholder trust in analytics

    - id: rule_dbt_testing
      name: Comprehensive dbt Testing Strategy
      severity: critical
      condition: |
        All models MUST have tests for primary keys (unique + not_null). Fact tables MUST have referential integrity
        tests (relationships) to dimension tables. Critical business logic MUST have custom SQL tests.
        Run "dbt test" before every pull request and fix all failures before merging. Use severity thresholds
        to distinguish between warnings and blocking errors.
      rationale: Tests are the safety net that prevents bad data from reaching business users and eroding trust

    - id: rule_documentation_required
      name: Documentation as Code
      severity: high
      condition: |
        Every model MUST have a description in the YAML file explaining what business question it answers.
        Every column SHOULD have a description. Document any assumptions, business rules, or known limitations.
        Generate and review dbt docs regularly. Update documentation when logic changes.
      rationale: Self-documenting code is a myth; explicit documentation enables self-service and reduces "what does this mean?" questions

    - id: rule_materialization_strategy
      name: Strategic Materialization Choices
      severity: high
      condition: |
        Use "view" for lightweight transformations and staging models. Use "table" for heavily-transformed marts
        queried by BI tools. Use "incremental" only for large fact tables (>1M rows with regular new data).
        Document the rationale for incremental strategy including unique_key and lookback window decisions.
      rationale: Wrong materialization causes unnecessary compute costs, slow queries, or stale data

    - id: rule_naming_conventions
      name: Strict Naming Conventions
      severity: high
      condition: |
        Follow dbt naming conventions: stg_[source]_[entity] for staging, int_[entity]_[verb] for intermediate,
        fct_[entity] for facts, dim_[entity] for dimensions. Use snake_case consistently. Column names should
        be descriptive and include units where applicable (e.g., amount_usd, duration_seconds).
      rationale: Consistent naming makes models discoverable and reduces cognitive load for team members

    - id: rule_dry_principle
      name: DRY (Don't Repeat Yourself)
      severity: high
      condition: |
        Never copy-paste SQL logic. Use CTEs in intermediate models for reusable transformations. Create macros
        for repeated calculations (e.g., currency conversion, date truncations). Reference upstream models
        using {{ ref() }} rather than hardcoding table names. Extract common patterns into generic tests.
      rationale: Duplicated logic leads to inconsistencies and maintenance nightmares when business rules change

    - id: rule_version_control
      name: Version Control Discipline
      severity: critical
      condition: |
        All dbt code MUST be in version control (Git). Create feature branches for changes. Open pull requests
        with clear descriptions linking to business requirements. Require code review before merging.
        Never commit directly to main. Tag releases for production deployments.
      rationale: Analytics code is production code and requires the same rigor as application development

    - id: rule_data_lineage
      name: Lineage Awareness and Impact Analysis
      severity: high
      condition: |
        Before modifying any model, examine downstream dependencies using "dbt ls --select model_name+".
        Understand which BI dashboards, reports, and downstream models will be affected. Communicate changes
        to stakeholders. Use dbt exposures to track BI tool dependencies.
      rationale: Breaking changes to upstream models can silently break downstream dashboards and reports

    - id: rule_performance_optimization
      name: Query Performance by Design
      severity: medium
      condition: |
        Design models with query patterns in mind. Partition large tables by date. Cluster by frequently-filtered
        columns. Avoid SELECT * in production models. Limit column proliferation—wide tables hurt BI tool performance.
        Profile query performance and optimize slow models proactively.
      rationale: Slow queries frustrate users and increase warehouse costs; performance should be considered upfront

    - id: rule_metrics_consistency
      name: Single Source of Truth for Metrics
      severity: critical
      condition: |
        Critical business metrics (revenue, active users, churn) should be defined in ONE place—either as dbt metrics,
        in a semantic layer, or in a dedicated metrics mart. Never let the same metric be calculated differently
        in different BI tools. Document metric definitions and business logic explicitly.
      rationale: Inconsistent metrics across reports destroy credibility and lead to conflicting business decisions

