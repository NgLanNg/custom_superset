, -96)"><rect/><foreignObject width="207.421875" height="192"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#fff !important" class="nodeLabel"><p>⚙️ Lambda: extract_excel_base_scenario<br />detect header → classify columns<br />→ map OC/Equity types → melt wide→long<br />→ trim strings → append to postgres</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SH1-0" transform="translate(173, 132)"><rect class="basic label-container" style="" x="-130" y="-99" width="260" height="198"/><g class="label" style="" transform="translate(-100, -84)"><rect/><foreignObject width="200" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Sheet: GHG Emission by Gases<br />Fields: BU, OPU, Gases (CH4/CO2/N2O/etc.), Source<br />Year cols: 2019…2050<br />Type: OC / Equity Share</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SH2-1" transform="translate(483, 132)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"/><g class="label" style="" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Sheet: Production<br />Fields: BU, OPU, Parameters, UOM<br />Year cols: 2019…2050<br />UOM filter: MTPA only (for methane intensity)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SEBG-2" transform="translate(173, 676)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>silver_emission_by_gases<br />Rows: BU, OPU, Gases, Source, Year, Value, Type<br />(all gas types — CH4, CO2, N2O, etc.)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SPROD-3" transform="translate(483, 676)"><rect class="basic label-container" style="" x="-130" y="-87" width="260" height="174"/><g class="label" style="" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>silver_production<br />Rows: BU, OPU, Parameters, UOM, Year, Value<br />UOM=MTPA filtered at gold layer</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-GMI-4" transform="translate(328, 1178)"><rect class="basic label-container" style="" x="-130" y="-315" width="260" height="630"/><g class="label" style="" transform="translate(-100, -300)"><rect/><foreignObject width="200" height="600"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>gold_methane_intensity<br />CTE 1: emission_by_methane (silver_emission_by_gases)<br />ROW_NUMBER() OVER (PARTITION BY bu, opu, gases, source, uom,<br />year, type ORDER BY updated_at DESC)<br />WHERE gases = 'CH4'  ← CH4 only<br />SUM(value) GROUP BY bu, opu, type, year<br />CTE 2: production (silver_production)<br />ROW_NUMBER() dedup<br />WHERE uom = 'MTPA'  ← LNG production units only<br />Final LEFT JOIN emission × production ON bu, opu, type, year<br />methane_intensity = value / (production × 1,000,000)<br />uom hardcoded = 'tonne CH4/tonne'</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SLIDE-16" transform="translate(328, 1715)"><rect class="basic label-container" style="fill:#1B5E20 !important;stroke:#388E3C !important" x="-130" y="-147" width="260" height="294"/><g class="label" style="color:#fff !important" transform="translate(-100, -132)"><rect/><foreignObject width="200" height="264"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#fff !important" class="nodeLabel"><p>🖼️ Slide 08 — Methane Emission &amp; Intensity (OC)<br />Gold table: gold_methane_intensity<br />Left: OPU stacked bar — CH4 emission (ktCH4)<br />Right: Per-OPU methane intensity (tCH4/tonne LNG)<br />Tables: YEP 2025 + 2026-2030 forecast for both metrics</p></span></div></foreignObject></g></g></g></g></g></svg>