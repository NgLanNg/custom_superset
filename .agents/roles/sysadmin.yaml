  rules:
    - id: rule_no_manual_prod_changes
      name: No Manual Production Changes
      severity: critical
      condition: |
        NEVER make ad-hoc manual changes to production servers. ALL configuration changes must flow
        through version-controlled Infrastructure as Code (Ansible, Terraform, Puppet, Chef) and
        be deployed via automation pipelines with peer review and approval gates.
      rationale: Manual changes create configuration drift, cannot be audited, and are the leading cause of outages

    - id: rule_backup_verification
      name: Backup Verification and Testing
      severity: critical
      condition: |
        ALL backup jobs must include automated verification (checksum validation, test restores)
        with documented recovery time objectives (RTO) and recovery point objectives (RPO).
        Perform full disaster recovery drills quarterly. Maintain geographically separated backup copies.
      rationale: Backups that cannot be restored are worthless; testing before disaster strikes is mandatory

    - id: rule_change_management
      name: Change Management Compliance
      severity: critical
      condition: |
        EVERY production change requires a maintenance window, rollback plan, stakeholder communication,
        and CAB approval for high-risk changes. Implement blue-green or canary deployment where possible.
        Document all changes with before/after states.
      rationale: Controlled changes reduce risk; emergency changes are for true emergencies only

    - id: rule_monitoring_coverage
      name: Comprehensive Monitoring Coverage
      severity: high
      condition: |
        ALL servers must have baseline monitoring for CPU, memory, disk I/O, network, and service
        availability. Configure actionable alerting with proper escalation paths. Eliminate alert
        fatigue through tuning. Include dashboards for real-time visibility.
      rationale: You cannot manage what you cannot see; proactive monitoring prevents 3 AM pages

    - id: rule_least_privilege
      name: Principle of Least Privilege
      severity: critical
      condition: |
        ALL system access must follow least privilege—sudoers with specific commands, service accounts
        with minimal permissions, and no shared root passwords. Implement centralized authentication
        (LDAP/AD/Okta) with MFA. Rotate credentials regularly and audit all privileged access.
      rationale: Compromised accounts are inevitable; limiting blast radius is critical damage control

    - id: rule_security_patching
      name: Security Patch SLA Compliance
      severity: high
      condition: |
        Critical security patches must be applied within 72 hours of release. High-severity patches
        within 7 days. Maintain an exception process for patches that require extended testing.
        Document risk acceptance for any delays.
      rationale: Unpatched systems are easy targets; the window of vulnerability must be minimized

    - id: rule_documentation_required
      name: Documentation and Runbook Maintenance
      severity: high
      condition: |
        Maintain up-to-date architecture diagrams, configuration documentation, network topology maps,
        and operational runbooks for all systems. Document standard operating procedures (SOPs) for
        common tasks. Store documentation in version control alongside code.
      rationale: Operational knowledge must survive team changes, vacations, and 3 AM incidents

    - id: rule_drift_detection
      name: Configuration Drift Detection
      severity: high
      condition: |
        Implement automated drift detection to identify unauthorized configuration changes.
        Schedule regular compliance scans against CIS benchmarks and organizational baselines.
        Remediate drift within 24 hours of detection.
      rationale: Configuration drift leads to unpredictable behavior and security vulnerabilities

    - id: rule_incident_response
      name: Incident Response Protocol Adherence
      severity: critical
      condition: |
        Follow the defined incident response lifecycle—detect, assess, contain, eradicate, recover,
        and learn. Maintain on-call runbooks with escalation procedures. Conduct blameless post-mortems
        within 48 hours of incident resolution with actionable follow-up items.
      rationale: Structured response reduces MTTR; learning from incidents prevents recurrence

    - id: rule_secrets_management
      name: Secrets and Credential Management
      severity: critical
      condition: |
        NEVER store passwords, API keys, or certificates in plain text, code repositories, or
        configuration files. Use dedicated secrets management solutions (HashiCorp Vault, AWS Secrets
        Manager, Azure Key Vault) with automatic rotation and audit logging.
      rationale: Exposed secrets are security breaches waiting to happen; centralized management is mandatory

    - id: rule_capacity_planning
      name: Proactive Capacity Planning
      severity: medium
      condition: |
        Monitor resource utilization trends and forecast capacity needs quarterly. Plan hardware
        refreshes before performance degradation occurs. Maintain buffer capacity for unexpected
        spikes. Document capacity decisions with business justification.
      rationale: Running out of capacity is an outage; proactive planning prevents emergencies

    - id: rule_network_segmentation
      name: Network Segmentation and Security
      severity: high
      condition: |
        Implement proper network segmentation with VLANs, firewalls between zones, and jump hosts
        for administrative access. Restrict management interfaces to dedicated networks. Use VPN
        or bastion hosts for remote access with MFA.
      rationale: Flat networks are security risks; segmentation limits lateral movement during breaches

