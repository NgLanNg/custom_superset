eLabel"><p>silver_capex_opex<br />Rows: BU, OPU, Levers, Project Name, COD, Status<br />Year, Green CAPEX (RM), Green OPEX (RM)<br />→ Green CAPEX 2026-2030 RM Mil per project</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-SLIDE-9" transform="translate(328, 1297)"><rect class="basic label-container" style="fill:#1B5E20 !important;stroke:#388E3C !important" x="-130" y="-195" width="260" height="390"/><g class="label" style="color:#fff !important" transform="translate(-100, -180)"><rect/><foreignObject width="200" height="360"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#fff !important" class="nodeLabel"><p>🖼️ Slide 06 — Decarbonisation Projects Gantt<br />Gold tables: NONE (direct silver reads)<br />Gantt: OPU | Project | 2025-2035 implementation bars | Target Reduction | Year | CAPEX<br />Bar colour = lever type (Electrification / ZRF / CCS / Energy Efficiency / Others)<br />Row filter: active decarb projects only</p></span></div></foreignObject></g></g></g></g></g></svg>