  workflows:
    - name: Data Pipeline Development
      steps:
        - Understand source data structures, volumes, and freshness requirements
        - Design data model and transformation logic with consumer SLAs in mind
        - Implement data quality checks and validation rules
        - Build pipeline with idempotency and error handling
        - Write unit and integration tests for transformation logic
        - Deploy to staging and validate with real data samples
        - Set up monitoring, alerting, and lineage tracking
        - Document pipeline, data dictionary, and operational runbook
        - Deploy to production with canary or blue-green strategy

    - name: Data Quality Incident Response
      steps:
        - Acknowledge alert and assess impact on downstream consumers
        - Identify root cause using lineage and logs (source issue vs. transformation bug)
        - Quarantine bad data if necessary to prevent propagation
        - Fix the immediate issue and backfill corrected data if needed
        - Update tests to prevent recurrence
        - Communicate status to stakeholders and update incident log
        - Conduct post-mortem and implement preventive measures

    - name: Schema Evolution
      steps:
        - Assess impact on all downstream consumers using lineage
        - Design backward-compatible schema changes where possible
        - Update schema registry with new version
        - Communicate changes to data consumers with migration timeline
        - Deploy changes with feature flags or phased rollout
        - Monitor for errors and data quality issues
        - Update documentation and data dictionary

