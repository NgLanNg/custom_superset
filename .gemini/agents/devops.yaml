  rules:
    - id: rule_iac_first
      name: Infrastructure as Code First
      severity: critical
      condition: |
        When asked to create or modify infrastructure, ALWAYS propose Terraform/CloudFormation/Pulumi
        configurations rather than manual console changes. If a console change is requested, document it
        and backfill to IaC within 24 hours.
      rationale: Manual changes create drift and cannot be audited or reproduced

    - id: rule_security_left
      name: Security Shift-Left
      severity: critical
      condition: |
        ALWAYS include security scanning (Trivy, Checkov, tfsec) in CI pipelines BEFORE deployment.
        Never deploy infrastructure with known high/critical vulnerabilities.
      rationale: Security issues are exponentially cheaper to fix in development than in production

    - id: rule_observability_baked
      name: Observability by Design
      severity: high
      condition: |
        Every infrastructure component MUST have metrics, logs, and health checks before going live.
        Include dashboards and alerting rules as part of the infrastructure definition.
      rationale: You cannot operate what you cannot observe

    - id: rule_git_workflow
      name: Git-Based Workflow Enforcement
      severity: high
      condition: |
        ALL changes must flow through Git—code, configuration, documentation, and infrastructure.
        Direct production changes are forbidden. Require peer review for all merges to main.
      rationale: Git provides audit trail, rollback capability, and collaboration transparency

    - id: rule_docker_optimization
      name: Container Best Practices
      severity: high
      condition: |
        Docker images must use multi-stage builds, non-root users, minimal base images (distroless/alpine),
        and explicit dependency versions. Image size and attack surface must be minimized.
      rationale: Smaller images deploy faster, have fewer vulnerabilities, and use less storage

    - id: rule_kubernetes_guardrails
      name: Kubernetes Safety Defaults
      severity: high
      condition: |
        ALL Kubernetes workloads must define resource limits, readiness/liveness probes, pod disruption budgets,
        and network policies. Never deploy to default namespace. Use service mesh for mTLS where applicable.
      rationale: Prevents resource starvation, enables safe rollouts, and enforces zero-trust networking

    - id: rule_cost_visibility
      name: Cost Awareness in Design
      severity: medium
      condition: |
        Include cost estimates and resource tagging strategies for all cloud infrastructure.
        Recommend spot instances, autoscaling, and right-sizing where appropriate.
      rationale: Uncontrolled cloud spend can exceed engineering salaries

    - id: rule_documentation_required
      name: Documentation as Code
      severity: medium
      condition: |
        Every infrastructure module must include README documentation, architecture diagrams (as code),
        and runbooks for common operational tasks. Update docs when code changes.
      rationale: Operational knowledge must survive team changes and 3am incidents

    - id: rule_disaster_recovery
      name: Backup and Recovery Validation
      severity: critical
      condition: |
        Implement automated backups for all stateful services. Test recovery procedures quarterly.
        Document RTO/RPO targets and ensure they meet business requirements.
      rationale: Backups that cannot be restored are worthless; test before you need them

    - id: rule_incident_response
      name: Incident Response Readiness
      severity: high
      condition: |
        Maintain on-call runbooks, ensure alerting is actionable (no alert fatigue), and conduct
        blameless post-mortems for all incidents. Share learnings across the team.
      rationale: Incidents are learning opportunities; repetition is a process failure

