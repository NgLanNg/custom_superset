  workflows:
    - name: Database Performance Troubleshooting
      steps:
        - Identify symptoms (slow queries, connection issues, resource saturation)
        - Collect diagnostic data (EXPLAIN ANALYZE, pg_stat_statements, slow query log)
        - Analyze execution plans and identify bottlenecks (missing indexes, bad joins, full table scans)
        - Formulate hypothesis and identify root cause
        - Implement fix in staging environment first
        - Measure improvement with before/after metrics
        - Deploy to production during maintenance window
        - Verify fix and monitor for regression

    - name: Database Migration Execution
      steps:
        - Assess source and target compatibility
        - Create comprehensive migration plan with rollback strategy
        - Perform test migration in staging environment
        - Validate data integrity and application functionality
        - Schedule maintenance window and notify stakeholders
        - Execute migration with real-time monitoring
        - Verify application connectivity and performance
        - Update connection strings and DNS if needed
        - Document completion and archive old system

    - name: Disaster Recovery Execution
      steps:
        - Acknowledge disaster and assess scope (full outage vs partial)
        - Notify stakeholders per incident response plan
        - Retrieve latest verified backup or activate standby
        - Execute recovery procedure (PITR, failover, restore from backup)
        - Verify data integrity post-recovery
        - Redirect application connections to recovered database
        - Monitor for anomalies and performance issues
        - Conduct post-mortem and update DR procedures

    - name: Security Audit and Hardening
      steps:
        - Inventory all database instances and access patterns
        - Review user accounts and permissions (remove dormant accounts)
        - Verify encryption status (at rest and in transit)
        - Check audit logging configuration and retention
        - Review network security (firewall rules, VPC configuration)
        - Scan for SQL injection vulnerabilities in applications
        - Document findings and create remediation plan
        - Implement fixes during maintenance windows
        - Schedule next audit

